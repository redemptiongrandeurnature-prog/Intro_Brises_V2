<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Rédemption GN</title>

<!--
╔══════════════════════════════════════════════════════════════════╗
║  GUIDE DE PERSONNALISATION                                       ║
╠══════════════════════════════════════════════════════════════════╣
║                                                                  ║
║  1. CHANGER LES VIDÉOS                                           ║
║     → Cherche  ═══ CONFIG VIDÉOS ═══  dans le JS                ║
║     → Remplace les IDs Vimeo par les tiens                       ║
║                                                                  ║
║  2. CHANGER LES QUESTIONS / CHOIX / COMMENTAIRES                 ║
║     → Cherche  ═══ CONFIG QUESTIONS ═══  dans le JS             ║
║     → Modifie le tableau QUESTIONS[]                             ║
║     → Chaque choix a un champ "feedback" (texte pendant trans.)  ║
║                                                                  ║
║  3. AJOUTER DES QUESTIONS                                        ║
║     → Ajoute un objet dans QUESTIONS[]                           ║
║     → Ajoute une section de vidéos dans VIDEO_SCENES[]           ║
║     → Le reste est automatique                                   ║
║                                                                  ║
║  4. CHEMINS DIFFÉRENTS SELON LA RÉPONSE                          ║
║     → Cherche  ═══ CONFIG CHEMINS ═══  dans le JS               ║
║     → Assigne des vidéos différentes par réponse                 ║
║                                                                  ║
║  5. COLLECTER LES DONNÉES (Google Sheets, gratuit)               ║
║     → Cherche  ═══ CONFIG COLLECTE ═══  dans le JS              ║
║     → Suit les instructions pour Apps Script                     ║
║                                                                  ║
║  6. INTÉGRATION IFRAME (Elementor / WordPress)                   ║
║     <iframe                                                      ║
║       src="https://TON_USER.github.io/TON_REPO/quiz-..."        ║
║       style="width:100%;height:100vh;border:none;"              ║
║       allow="autoplay; fullscreen"                               ║
║     ></iframe>                                                   ║
║     L'attribut allow="autoplay" est OBLIGATOIRE.                 ║
║                                                                  ║
║  NOTE VIMEO : Tes vidéos doivent permettre l'intégration.        ║
║  Dans Vimeo → chaque vidéo → Paramètres → Intégration            ║
║  → "Où cette vidéo peut-elle être intégrée?" → Partout           ║
║                                                                  ║
╚══════════════════════════════════════════════════════════════════╝
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --noir:    #04050a;
  --argent:  #bec8d6;
  --or:      #b89a5a;
  --or-pale: #d4b97a;
  --blanc:   #f0ece4;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--noir);
  color: var(--blanc);
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
}

/* ═══════════════════════════════════════════════
   COUCHE 1 — VIDÉOS VIMEO (3 slots)

   Architecture :
   ┌─ slot-loop-a ─┐  Boucle A (alterne avec B)
   ├─ slot-trans   ┤  Transition (joue une fois)
   └─ slot-loop-b ─┘  Boucle B (alterne avec A)

   Les z-index sont gérés dynamiquement en JS.
   CSS s'occupe uniquement du fade opacity.
═══════════════════════════════════════════════ */
#scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: var(--noir);
}

.vid-slot {
  position: absolute;
  inset: 0;
  overflow: hidden;
  opacity: 0;
  transition: opacity 1200ms cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
.vid-slot.active { opacity: 1; }

/*
  iframe "cover" : object-fit:cover ne s'applique pas aux iframes,
  on simule avec width/height en unités croisées vh/vw.
*/
.vid-slot iframe,
.vid-slot > div > iframe {
  position: absolute !important;
  width:  177.78vh !important;
  min-width: 100% !important;
  height: 56.25vw !important;
  min-height: 100% !important;
  top:  50% !important;
  left: 50% !important;
  transform: translate(-50%, -50%) !important;
  border: 0 !important;
  pointer-events: none !important;
}

/* ═══════════════════════════════════════════════
   OVERLAY SEAMLESS LOOP FADE
   Injecté dynamiquement dans chaque slot-loop.
   Géré par VideoManager._watchLoop().
═══════════════════════════════════════════════ */
.loop-fade-overlay {
  position: absolute; inset: 0;
  background: var(--noir);
  opacity: 0;
  pointer-events: none;
  z-index: 2; /* Au-dessus de l'iframe, dans le slot */
}

/* ═══════════════════════════════════════════════
   COUCHE 2 — BRUME PERMANENTE
═══════════════════════════════════════════════ */
#fog {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
#fog::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 92% 92% at 50% 50%,
    transparent 22%,
    rgba(0,0,0,0.42) 60%,
    rgba(0,0,0,0.82) 100%);
}
#fog::after {
  content: '';
  position: absolute;
  bottom: -8%; left: -5%; right: -5%; height: 42%;
  background: radial-gradient(ellipse 120% 100% at 50% 100%,
    rgba(4,5,10,0.94) 0%, rgba(4,5,10,0.5) 55%, transparent 100%);
  animation: fog-breathe 16s ease-in-out infinite alternate;
}
@keyframes fog-breathe {
  0%   { transform: translateY(0)   scaleX(1);    opacity: 0.8; }
  100% { transform: translateY(-2%) scaleX(1.04); opacity: 1;   }
}

.horizon {
  position: fixed; z-index: 2; pointer-events: none;
  left: 0; right: 0; top: 47%; height: 22vh;
  background: radial-gradient(ellipse 65% 100% at 50% 50%,
    rgba(180,195,215,0.02) 0%, transparent 70%);
  animation: horizon-pulse 18s ease-in-out infinite alternate;
}
@keyframes horizon-pulse {
  0%   { opacity: 0.4; transform: scaleX(1); }
  100% { opacity: 1;   transform: scaleX(1.12); }
}

.wisp {
  position: fixed;
  border-radius: 50%;
  filter: blur(55px);
  pointer-events: none; z-index: 2;
  animation: wisp-travel linear infinite;
  opacity: 0;
}
@keyframes wisp-travel {
  0%   { transform: translateX(-150px) translateY(4px);                opacity: 0; }
  8%   { opacity: 0.055; }
  92%  { opacity: 0.03; }
  100% { transform: translateX(calc(100vw + 150px)) translateY(-18px); opacity: 0; }
}

/* ═══════════════════════════════════════════════
   COMMENTAIRE DE TRANSITION
   Apparaît pendant une vidéo de transition.
   Affiche le feedback lié à la réponse choisie.
═══════════════════════════════════════════════ */
#transition-commentary {
  position: fixed;
  bottom: 16%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  width: 90%;
  max-width: 580px;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 800ms ease;
}
#transition-commentary.active { opacity: 1; }

.trans-label {
  font-family: 'Cinzel', serif;
  font-size: 0.46rem;
  letter-spacing: 0.52em;
  color: rgba(184,154,90,0.38);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.trans-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.88rem, 2vw, 1.15rem);
  color: rgba(200,207,216,0.5);
  line-height: 1.85;
  letter-spacing: 0.04em;
}

/* ═══════════════════════════════════════════════
   CHARGEMENT
═══════════════════════════════════════════════ */
#loading {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: var(--noir);
  transition: opacity 800ms ease;
}
#loading.hide { opacity: 0; pointer-events: none; }
#loading span {
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 0.5em;
  color: rgba(184,154,90,0.4);
  animation: loading-pulse 1.6s ease-in-out infinite;
}
@keyframes loading-pulse {
  0%,100% { opacity: 0.3; }
  50%      { opacity: 0.8; }
}

/* ═══════════════════════════════════════════════
   PROGRESSION
═══════════════════════════════════════════════ */
#progress-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 1px; background: rgba(200,207,216,0.07); z-index: 50;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--or), transparent);
  width: 0%;
  transition: width 900ms cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 10px rgba(184,154,90,0.45);
}
#step-counter {
  position: fixed; top: 1.8rem; right: 2.5rem;
  font-family: 'Cinzel', serif; font-size: 0.58rem;
  letter-spacing: 0.38em; color: rgba(200,207,216,0.28); z-index: 50;
  transition: opacity 600ms ease;
}

/* ═══════════════════════════════════════════════
   COUCHE 3 — INTERFACE QUIZ
═══════════════════════════════════════════════ */
#app {
  position: fixed; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}

.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1.5rem;
  opacity: 0; pointer-events: none;
  transition: opacity 700ms ease;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ── Textes ── */
.main-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  font-weight: 400; letter-spacing: 0.2em;
  color: var(--blanc); text-align: center; line-height: 1.25;
  margin-bottom: 0.9rem;
  text-shadow: 0 0 80px rgba(184,154,90,0.12);
}
.subtitle {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: clamp(0.9rem, 2.2vw, 1.18rem);
  color: rgba(200,207,216,0.48); text-align: center;
  max-width: 420px; line-height: 1.9; margin-bottom: 3.2rem;
  letter-spacing: 0.04em;
}
.q-label {
  font-family: 'Cinzel', serif; font-size: clamp(0.48rem, 1vw, 0.6rem);
  letter-spacing: 0.48em; color: var(--or);
  text-align: center; margin-bottom: 1.5rem; opacity: 0.72;
}
.q-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.2rem, 3.2vw, 1.95rem);
  font-weight: 300; text-align: center;
  max-width: 620px; line-height: 1.62;
  color: var(--blanc); margin-bottom: 2.6rem; letter-spacing: 0.02em;
}

/* ── Choix ── */
.choices {
  display: flex; flex-direction: column;
  gap: 0.75rem; width: 100%; max-width: 470px;
}
.choice-btn {
  position: relative;
  background: transparent;
  border: 1px solid rgba(200,207,216,0.1);
  color: rgba(200,207,216,0.72);
  font-family: 'Raleway', sans-serif; font-weight: 300;
  font-size: clamp(0.76rem, 1.6vw, 0.88rem);
  letter-spacing: 0.1em; padding: 1rem 1.5rem;
  cursor: pointer; text-align: left; overflow: hidden;
  animation: choice-float 5.5s ease-in-out infinite;
  transition: border-color 320ms ease, color 320ms ease,
              transform 280ms cubic-bezier(0.34,1.56,0.64,1),
              box-shadow 320ms ease, background 320ms ease;
}
.choice-btn:nth-child(1) { animation-delay:  0.0s; }
.choice-btn:nth-child(2) { animation-delay:  1.1s; }
.choice-btn:nth-child(3) { animation-delay:  2.2s; }
.choice-btn:nth-child(4) { animation-delay:  3.3s; }
@keyframes choice-float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}
.choice-btn::before {
  content: '';
  position: absolute; top: 0; left: -80%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(184,154,90,0.07) 50%, transparent 100%);
  transform: skewX(-12deg);
  transition: left 480ms ease;
}
.choice-btn::after {
  content: '';
  position: absolute; left: 0; top: 18%; bottom: 18%; width: 1px;
  background: linear-gradient(180deg, transparent, rgba(184,154,90,0.5), transparent);
  opacity: 0; transition: opacity 320ms ease;
}
.choice-btn:hover {
  animation: none;
  border-color: rgba(184,154,90,0.3);
  color: var(--blanc); transform: translateX(5px);
  box-shadow: 0 0 25px rgba(184,154,90,0.07), inset 0 0 20px rgba(184,154,90,0.03);
}
.choice-btn:hover::before { left: 120%; }
.choice-btn:hover::after  { opacity: 1; }
.choice-btn.selected {
  animation: sel-breathe 3s ease-in-out infinite;
  border-color: rgba(184,154,90,0.55); color: var(--or-pale);
  background: rgba(184,154,90,0.06); transform: translateX(5px);
}
.choice-btn.selected::before { animation: shimmer 2.4s 0.3s ease-in-out infinite; }
.choice-btn.selected::after  { opacity: 1; }
@keyframes sel-breathe {
  0%,100% { box-shadow: 0 0 32px rgba(184,154,90,0.09), inset 0 0 28px rgba(184,154,90,0.05); }
  50%      { box-shadow: 0 0 48px rgba(184,154,90,0.17), inset 0 0 38px rgba(184,154,90,0.08); }
}
@keyframes shimmer {
  0%   { left: -80%; }
  100% { left: 140%; }
}
.choice-letter {
  font-family: 'Cinzel', serif; font-size: 0.52rem;
  letter-spacing: 0.2em; color: var(--or);
  margin-right: 0.8rem; opacity: 0.55;
  transition: opacity 280ms ease;
}
.choice-btn:hover .choice-letter,
.choice-btn.selected .choice-letter { opacity: 1; }

/* ── Bouton principal ── */
.btn-main {
  margin-top: 2rem; background: transparent;
  border: 1px solid rgba(184,154,90,0.32);
  color: var(--or-pale); font-family: 'Cinzel', serif;
  font-size: 0.58rem; font-weight: 500;
  letter-spacing: 0.48em; padding: 0.95rem 2.8rem;
  cursor: pointer; transition: all 440ms ease;
  text-transform: uppercase; position: relative; overflow: hidden;
}
.btn-main::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(184,154,90,0), rgba(184,154,90,0.08));
  opacity: 0; transition: opacity 380ms ease;
}
.btn-main:hover:not(:disabled) {
  border-color: var(--or); letter-spacing: 0.58em;
  box-shadow: 0 0 44px rgba(184,154,90,0.12);
}
.btn-main:hover:not(:disabled)::after { opacity: 1; }
.btn-main:disabled { opacity: 0.2; cursor: not-allowed; }

/* ── Séparateur ── */
.sep {
  display: flex; align-items: center; gap: 1.2rem; margin: 0.4rem 0;
}
.sep::before, .sep::after {
  content: ''; width: 90px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,154,90,0.22), transparent);
}
.sep-gem { width: 4px; height: 4px; background: var(--or); transform: rotate(45deg); opacity: 0.35; }

/* ── Résultat ── */
.result-wrap { text-align: center; max-width: 560px; width: 100%; }
.result-arch {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.5rem, 4.5vw, 2.7rem);
  color: var(--or-pale); letter-spacing: 0.18em; margin-bottom: 0.4rem;
  text-shadow: 0 0 50px rgba(184,154,90,0.28);
}
.result-desc {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: clamp(0.92rem, 2.2vw, 1.22rem);
  color: rgba(200,207,216,0.52); margin-bottom: 1.8rem; line-height: 1.75;
}
.result-recap {
  border-top: 1px solid rgba(200,207,216,0.07);
  padding-top: 1.3rem; margin-bottom: 1.7rem;
  text-align: left; display: flex; flex-direction: column; gap: 0.55rem;
}
.recap-row { display: flex; gap: 0.9rem; font-size: 0.73rem; }
.recap-row .rq {
  font-family: 'Cinzel', serif; font-size: 0.52rem; letter-spacing: 0.18em;
  color: rgba(184,154,90,0.42); min-width: 88px; padding-top: 2px; white-space: nowrap;
}
.recap-row .ra {
  color: rgba(200,207,216,0.62); font-family: 'Raleway', sans-serif;
  font-weight: 300; line-height: 1.5;
}
.email-wrap { width: 100%; text-align: center; }
.email-lbl {
  display: block; font-family: 'Cinzel', serif; font-size: 0.52rem;
  letter-spacing: 0.35em; color: rgba(184,154,90,0.5); margin-bottom: 0.7rem;
}
.email-input {
  width: 100%; max-width: 360px; background: transparent; border: none;
  border-bottom: 1px solid rgba(200,207,216,0.16); color: var(--blanc);
  font-family: 'Raleway', sans-serif; font-weight: 300; font-size: 0.86rem;
  letter-spacing: 0.1em; padding: 0.7rem 0.4rem; text-align: center; outline: none;
  transition: border-color 380ms ease;
}
.email-input::placeholder { color: rgba(200,207,216,0.18); }
.email-input:focus { border-bottom-color: rgba(184,154,90,0.42); }

/* ── Effet mist burst ── */
.mist-ring {
  position: fixed; border-radius: 50%;
  border: 1px solid rgba(210,225,245,0.55);
  transform: translate(-50%,-50%) scale(0);
  pointer-events: none; z-index: 200;
  animation: ring-expand 850ms cubic-bezier(0.2,0.6,0.4,1) forwards;
}
@keyframes ring-expand {
  0%   { width: 18px; height: 7px; transform: translate(-50%,-50%) scale(0); border-color: rgba(220,235,255,0.75); }
  40%  { border-color: rgba(184,154,90,0.3); }
  100% { width: 260px; height: 62px; transform: translate(-50%,-50%) scale(1); border-color: rgba(184,154,90,0); }
}
.sel-pt {
  position: fixed; width: 2.5px; height: 2.5px; border-radius: 50%;
  pointer-events: none; z-index: 201;
  animation: pt-fly ease-out forwards;
}
@keyframes pt-fly {
  0%   { transform: translate(-50%,-50%) translate(0,0) scale(1); opacity: 0.9; }
  100% { transform: translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
}

/* ── Animations d'entrée ── */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(15px); }
  to   { opacity: 1; transform: translateY(0); }
}
.screen.active .q-label      { animation: fade-up 580ms  70ms both ease; }
.screen.active .q-text        { animation: fade-up 580ms 210ms both ease; }
.screen.active .choices       { animation: fade-up 580ms 360ms both ease; }
.screen.active .btn-main      { animation: fade-up 580ms 500ms both ease; }
.screen.active .main-title    { animation: fade-up 680ms 160ms both ease; }
.screen.active .subtitle      { animation: fade-up 680ms 330ms both ease; }
.screen.active .sep           { animation: fade-up 680ms 440ms both ease; }
.screen.active .result-arch   { animation: fade-up 680ms  70ms both ease; }
.screen.active .result-desc   { animation: fade-up 680ms 220ms both ease; }
.screen.active .result-recap  { animation: fade-up 680ms 400ms both ease; }
.screen.active .email-wrap    { animation: fade-up 680ms 560ms both ease; }

/* ── Responsive ── */
@media (max-width: 560px) {
  .q-text { font-size: 1.12rem; }
  .choices { gap: 0.6rem; }
  .choice-btn { padding: 0.88rem 1.1rem; }
  .btn-main { padding: 0.88rem 2rem; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     CHARGEMENT
════════════════════════════════════════ -->
<div id="loading"><span>RÉDEMPTION</span></div>

<!-- ═══════════════════════════════════════
     COUCHE 1 — 3 SLOTS VIDÉO
════════════════════════════════════════ -->
<div id="scene">
  <div id="slot-loop-a" class="vid-slot"></div>
  <div id="slot-trans"  class="vid-slot"></div>
  <div id="slot-loop-b" class="vid-slot"></div>
</div>

<!-- ═══════════════════════════════════════
     COUCHE 2 — BRUME
════════════════════════════════════════ -->
<div id="fog"></div>
<div class="horizon"></div>

<!-- ═══════════════════════════════════════
     COMMENTAIRE DE TRANSITION (nouveau)
     Visible uniquement pendant les vidéos
     de transition, caché pendant les loops.
════════════════════════════════════════ -->
<div id="transition-commentary">
  <p class="trans-label">votre chemin se révèle</p>
  <p id="trans-commentary-text" class="trans-text"></p>
</div>

<!-- ═══════════════════════════════════════
     UI
════════════════════════════════════════ -->
<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="step-counter"></div>

<div id="app">

  <!-- ── INTRO ── -->
  <div class="screen" id="screen-0">
    <p class="q-label">Rédemption GN</p>
    <h1 class="main-title">Découvrez<br>votre profil</h1>
    <p class="subtitle">
      Une courte expérience pour révéler<br>
      le joueur que vous êtes vraiment.
    </p>
    <div class="sep"><div class="sep-gem"></div></div>
    <button class="btn-main" id="btn-start">Commencer l'expérience</button>
  </div>

  <!-- ── Les questions sont générées dynamiquement (voir QUESTIONS dans le JS) ── -->

  <!-- ── RÉSULTAT ── -->
  <div class="screen" id="screen-result">
    <div class="result-wrap">
      <p class="q-label">Votre profil</p>
      <h2 class="result-arch" id="result-arch">—</h2>
      <p class="result-desc"  id="result-desc">—</p>
      <div class="sep"><div class="sep-gem"></div></div>
      <div class="result-recap" id="result-recap"></div>
      <div class="email-wrap">
        <span class="email-lbl">Recevoir votre profil par courriel</span>

/* ════════════════════════════════════════════════════════════
   VIDEO MANAGER v4
   ────────────────────────────────────────────────────────────
   Orchestre 3 players Vimeo :

   playerA / playerB  → boucles (alternent : l'un actif, l'autre précharge)
   playerT            → transitions (joue une fois, jamais en loop)

   États : 'IDLE' → 'TRANSITION' → 'LOOP' → 'TRANSITION' → …

   Cross-fade propre :
   • La boucle suivante commence à fade-in à (durée_trans − 1.2s)
   • La transition commence à fade-out 300ms plus tard
   • Jamais de frame noire entre les deux
   • La transition est mise en pause dès le début du cross-fade
     pour éviter qu'elle tente de looper.

   Seamless loops :
   • Un overlay noir dans chaque slot de boucle
   • Fade-out (overlay → opaque) à (durée_loop − 0.8s)
   • Snap noir + fade-in (overlay → transparent) au restart
════════════════════════════════════════════════════════════ */
class VideoManager {
  constructor() {
    this.slotA = document.getElementById('slot-loop-a');
    this.slotT = document.getElementById('slot-trans');
    this.slotB = document.getElementById('slot-loop-b');

    /* Overlays pour les seamless loops */
    this.overlayA = this._addOverlay(this.slotA);
    this.overlayB = this._addOverlay(this.slotB);

    this.playerA = this.playerT = this.playerB = null;

    this.activeLoop = 'A'; /* Quel slot de boucle est actif */
    this._state     = 'IDLE';
    this._ready     = false;

    /*
      État de la transition courante.
      Réinitialisé à chaque goTo() / init().
      Utilisé par les watchers persistants attachés une seule fois.
    */
    this._trans = {
      pendingSlot: null, /* Slot de boucle à révéler après la transition */
      pendingCb:   null, /* Callback une fois la transition terminée */
      dur:         null, /* Durée en secondes (null = pas encore récupérée) */
      fired:       false /* Cross-fade déjà déclenché ? */
    };

    /*
      État de chaque boucle pour le seamless fade.
      Réinitialisé quand une nouvelle vidéo est chargée dans le slot.
    */
    this._loop = {
      A: { dur: null, fadedOut: false },
      B: { dur: null, fadedOut: false }
    };

    /* Éléments HTML du commentaire de transition */
    this._commEl   = document.getElementById('transition-commentary');
    this._commText = document.getElementById('trans-commentary-text');

    /* Z-indices de base (gérés dynamiquement en JS) */
    this.slotA.style.zIndex = 2;
    this.slotT.style.zIndex = 3;
    this.slotB.style.zIndex = 1;
  }

  /* ── Crée l'overlay seamless dans un slot ── */
  _addOverlay(slot) {
    const el = document.createElement('div');
    el.className = 'loop-fade-overlay';
    slot.appendChild(el);
    return el;
  }

  /* ── Crée un player Vimeo dans un slot ── */
  _makePlayer(slot, id, isLoop) {
    return new Vimeo.Player(slot, {
      id:         parseInt(id, 10),
      background: 1,
      loop:       isLoop ? 1 : 0,
      autoplay:   1,
      muted:      1,
      responsive: 1
    });
  }

  /*
    Attache le watcher de seamless loop pour un slot donné.
    N'est attaché qu'une seule fois par player.
    Utilise this._loop[slot] — toujours lu en direct, donc
    réinitialisable de l'extérieur via this._loop[slot] = {…}.
  */
  _attachLoopWatcher(player, slot) {
    const FADE_S   = 0.7;   /* Durée du fade en secondes */
    const TRIGGER  = FADE_S + 0.15; /* Déclenchement avant la fin */
    const overlay  = slot === 'A' ? this.overlayA : this.overlayB;

    player.on('timeupdate', async ({ seconds }) => {
      /* Seulement quand ce slot est la boucle active et qu'on est en mode LOOP */
      if (this._state !== 'LOOP' || this.activeLoop !== slot) return;

      const ls = this._loop[slot]; /* Toujours en direct */

      /* Récupérer la durée si pas encore connue */
      if (!ls.dur) {
        try { ls.dur = await player.getDuration(); } catch(e) { return; }
        if (!ls.dur) return;
      }

      const left = ls.dur - seconds;

      /* Approche de la fin → fade overlay vers noir */
      if (left <= TRIGGER && left > 0 && !ls.fadedOut) {
        ls.fadedOut = true;
        overlay.style.transition = `opacity ${FADE_S * 1000}ms ease`;
        overlay.style.opacity    = '1';
      }

      /* Boucle redémarrée → snap noir puis fade vers transparent */
      if (seconds < 0.15 && ls.fadedOut) {
        ls.fadedOut = false;
        ls.dur      = null; /* Sera re-fetché au prochain cycle */
        overlay.style.transition = 'none';
        overlay.style.opacity    = '1';
        /* Double RAF pour forcer un repaint avant la transition */
        requestAnimationFrame(() => requestAnimationFrame(() => {
          overlay.style.transition = `opacity ${FADE_S * 1000}ms ease`;
          overlay.style.opacity    = '0';
        }));
      }
    });
  }

  /*
    Attache le watcher de fin de transition sur playerT.
    N'est attaché qu'une seule fois, pendant init().
    Utilise this._trans — toujours lu en direct.
  */
  _attachTransWatcher() {
    /* Détection par position temporelle (plus fiable que 'ended') */
    this.playerT.on('timeupdate', async ({ seconds }) => {
      if (this._state !== 'TRANSITION') return;
      const t = this._trans;
      if (t.fired) return;

      /* Récupérer la durée si pas encore connue */
      if (!t.dur) {
        try { t.dur = await this.playerT.getDuration(); } catch(e) { return; }
        if (!t.dur) return;
      }

      /* Déclencher le cross-fade à 1.2s de la fin */
      if ((t.dur - seconds) <= 1.2 && seconds > 0.3) {
        t.fired = true;
        this._crossFade(t.pendingSlot, t.pendingCb);
      }
    });

    /* Fallback : événement 'ended' */
    this.playerT.on('ended', () => {
      if (this._state === 'TRANSITION' && !this._trans.fired) {
        this._trans.fired = true;
        this._crossFade(this._trans.pendingSlot, this._trans.pendingCb);
      }
    });
  }

  /*
    Déclenche le cross-fade : fade-in de la prochaine boucle,
    fade-out de la transition (avec léger décalage).
    Après 1400ms, l'état passe en LOOP et le callback est appelé.
  */
  _crossFade(toSlot, afterCb) {
    if (!toSlot) return; /* Transition finale sans suite */

    const toEl   = toSlot === 'A' ? this.slotA   : this.slotB;
    const fromEl = toSlot === 'A' ? this.slotB   : this.slotA;
    const toOv   = toSlot === 'A' ? this.overlayA : this.overlayB;

    /* S'assurer que l'overlay de la nouvelle boucle est transparent */
    toOv.style.transition = 'none';
    toOv.style.opacity    = '0';
    this._loop[toSlot] = { dur: null, fadedOut: false };

    /* Z-indices : nouvelle boucle sur le dessus, trans en dessous */
    toEl.style.zIndex        = 5;
    this.slotT.style.zIndex  = 3;
    fromEl.style.zIndex      = 1;

    /* Fade-in de la nouvelle boucle */
    const toPlayer = toSlot === 'A' ? this.playerA : this.playerB;
    try { toPlayer.play(); } catch(e) {}
    toEl.classList.add('active');

    /* Masquer le commentaire */
    this._commEl?.classList.remove('active');

    /* Fade-out de la transition avec 300ms de décalage (cross-fade propre) */
    setTimeout(() => {
      this.slotT.classList.remove('active');
      /* Mettre en pause la transition pour éviter qu'elle tente de looper */
      try { this.playerT.pause(); } catch(e) {}
    }, 300);

    /* Nettoyage après la fin du cross-fade CSS (1200ms) */
    setTimeout(() => {
      fromEl.classList.remove('active');

      /* Normaliser les z-indices */
      toEl.style.zIndex       = 2;
      fromEl.style.zIndex     = 1;
      this.slotT.style.zIndex = 3;

      /* Réinitialiser l'état de l'ancienne boucle */
      const fromSlot = toSlot === 'A' ? 'B' : 'A';
      this._loop[fromSlot] = { dur: null, fadedOut: false };
      const fromOv = fromSlot === 'A' ? this.overlayA : this.overlayB;
      fromOv.style.transition = 'none';
      fromOv.style.opacity    = '0';

      this.activeLoop = toSlot;
      this._state     = 'LOOP';

      if (afterCb) afterCb();
    }, 1400); /* Légèrement supérieur à la durée CSS (1200ms) */
  }

  /* ── Initialisation : joue l'intro puis boucle sur loopId ── */
  async init(introId, loopId) {
    this._state = 'TRANSITION';

    /* Créer les 3 players */
    this.playerT = this._makePlayer(this.slotT, introId, false);
    this.playerA = this._makePlayer(this.slotA, loopId,  true);
    this.playerB = this._makePlayer(this.slotB, loopId,  true);

    /* Attendre que le player de transition soit prêt */
    await this.playerT.ready();

    /* Attacher les watchers persistants (une seule fois) */
    this._attachTransWatcher();

    /* Configurer la première transition (intro → boucle A) */
    this._trans = { pendingSlot: 'A', pendingCb: null, dur: null, fired: false };

    /* Lecture explicite (l'autoplay peut être bloqué sur certains navigateurs) */
    try { await this.playerT.play(); } catch(e) {}

    /* Rendre la transition visible (z-index élevé pendant l'intro) */
    this.slotT.style.zIndex = 10;
    this.slotT.classList.add('active');

    /* Masquer le loading dès que la vidéo joue vraiment (premier timeupdate) */
    let loadingHidden = false;
    const onFirstPlay = ({ seconds }) => {
      if (seconds > 0.05 && !loadingHidden) {
        loadingHidden = true;
        this._ready = true;
        document.getElementById('loading').classList.add('hide');
        document.getElementById('screen-0').classList.add('active');
      }
    };
    this.playerT.on('timeupdate', onFirstPlay);

    /* Fallback : afficher après 6s si la vidéo ne démarre pas */
    setTimeout(() => {
      if (!loadingHidden) {
        loadingHidden = true;
        this._ready = true;
        document.getElementById('loading').classList.add('hide');
        document.getElementById('screen-0').classList.add('active');
      }
    }, 6000);

    /* Attacher les watchers de boucle une fois que les players sont prêts */
    this.playerA.ready().then(() => {
      this._attachLoopWatcher(this.playerA, 'A');
      try { this.playerA.play(); } catch(e) {} /* Lancer en avance pour réduire le lag */
    }).catch(() => {});

    this.playerB.ready().then(() => {
      this._attachLoopWatcher(this.playerB, 'B');
    }).catch(() => {});
  }

  /*
    Lance une transition vers une nouvelle scène.
    transId   : ID Vimeo de la vidéo de transition
    loopId    : ID Vimeo de la prochaine boucle (précharge pendant la transition)
    afterCb   : callback appelé quand la prochaine boucle est pleinement visible
    commentary: texte affiché pendant la transition (feedback du choix)
  */
  async goTo(transId, loopId, afterCb, commentary) {
    if (!this._ready) return;

    const nextSlot   = this.activeLoop === 'A' ? 'B' : 'A';
    const nextPlayer = nextSlot === 'A' ? this.playerA : this.playerB;
    const currEl     = this.activeLoop === 'A' ? this.slotA : this.slotB;
    const nextEl     = nextSlot === 'A' ? this.slotA : this.slotB;

    this._state = 'TRANSITION';

    /* Z-indices : boucle courante en bas, transition au milieu, prochaine boucle masquée */
    currEl.style.zIndex       = 1;
    this.slotT.style.zIndex   = 3;
    nextEl.style.zIndex       = 1;

    /* Préparer l'état de la transition */
    this._loop[nextSlot] = { dur: null, fadedOut: false };
    this._trans = { pendingSlot: nextSlot, pendingCb: afterCb || null, dur: null, fired: false };

    /* Précharger la prochaine boucle en arrière-plan */
    try { await nextPlayer.loadVideo(parseInt(loopId, 10)); } catch(e) {
      console.warn('[VideoMgr] Erreur chargement boucle:', e);
    }

    /* Charger et démarrer la transition */
    try { await this.playerT.loadVideo(parseInt(transId, 10)); } catch(e) {
      console.warn('[VideoMgr] Erreur chargement transition:', e);
    }
    this.slotT.classList.add('active');
    try { await this.playerT.play(); } catch(e) {}

    /* Afficher le commentaire (avec délai pour laisser la vidéo s'établir) */
    if (commentary && this._commText && this._commEl) {
      this._commText.textContent = commentary;
      setTimeout(() => {
        if (this._state === 'TRANSITION') {
          this._commEl.classList.add('active');
        }
      }, 700);
    }
  }

  /* ── Transition finale (sans boucle suivante) ── */
  async playFinal(transId) {
    if (!this._ready) return;
    this._state = 'TRANSITION';

    /* Pas de pendingSlot → _crossFade ne fera rien */
    this._trans = { pendingSlot: null, pendingCb: null, dur: null, fired: false };

    const currEl = this.activeLoop === 'A' ? this.slotA : this.slotB;
    currEl.style.zIndex     = 1;
    this.slotT.style.zIndex = 10;

    try {
      await this.playerT.loadVideo(parseInt(transId, 10));
      this.slotT.classList.add('active');
      await this.playerT.play();
    } catch(e) {}
  }
}

const videoMgr = new VideoManager();



/* ════════════════════════════════════════════════════════════
   ÉTAT DU QUIZ
════════════════════════════════════════════════════════════ */
const state = {
  step:    0,
  answers: {}
};


/* ════════════════════════════════════════════════════════════
   GÉNÉRATION DES ÉCRANS DE QUESTIONS
════════════════════════════════════════════════════════════ */
function buildQuestionScreens() {
  const app          = document.getElementById('app');
  const resultScreen = document.getElementById('screen-result');
  const letters      = ['A','B','C','D','E'];

  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'screen';
    div.id = `screen-q${i}`;

    const choicesHTML = q.choices.map((c, ci) => `
      <button class="choice-btn"
        data-qi="${i}"
        data-value="${c.value}"
        data-label="${c.label.replace(/"/g,'&quot;')}">
        <span class="choice-letter">${letters[ci]}</span>
        ${c.label}
      </button>`).join('');

    div.innerHTML = `
      <p class="q-label">${q.label}</p>
      <h2 class="q-text">${q.text.replace(/\n/g,'<br>')}</h2>
      <div class="choices">${choicesHTML}</div>
      <button class="btn-main" id="btn-q${i}" disabled>
        ${i < QUESTIONS.length - 1 ? 'Continuer' : 'Révéler mon profil'}
      </button>`;

    app.insertBefore(div, resultScreen);
  });
}


/* ════════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelector('.screen.active')?.classList.remove('active');
  if (id) document.getElementById(id)?.classList.add('active');
}

function updateProgress(qIndex) {
  const total = QUESTIONS.length;
  const pct   = qIndex < 0   ? 0
              : qIndex >= total ? 100
              : ((qIndex + 1) / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  const ctr = document.getElementById('step-counter');
  if (qIndex >= 0 && qIndex < total) {
    ctr.textContent  = `${qIndex + 1} — ${total}`;
    ctr.style.opacity = '1';
  } else {
    ctr.style.opacity = '0';
  }
}

function resolveNextVideos(qIndex, choiceValue) {
  const key = `Q${qIndex + 1}_${choiceValue}`;
  if (CHEMINS[key]) return CHEMINS[key];
  const scene = VIDEO_SCENES[qIndex];
  const next  = VIDEO_SCENES[qIndex + 1];
  return { trans: scene.trans, loop: next.loop };
}


/* ════════════════════════════════════════════════════════════
   SÉLECTION D'UN CHOIX
════════════════════════════════════════════════════════════ */
document.addEventListener('click', function(e) {
  /* Bouton choix */
  const btn = e.target.closest('.choice-btn');
  if (btn) {
    const qi    = parseInt(btn.dataset.qi, 10);
    const value = btn.dataset.value;
    const label = btn.dataset.label;

    btn.closest('.choices').querySelectorAll('.choice-btn')
       .forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    state.answers[qi] = { value, label, question: QUESTIONS[qi].label };
    document.getElementById(`btn-q${qi}`).disabled = false;
    spawnMistBurst(btn);
  }

  /* Bouton "Continuer" / "Révéler" */
  const btnQ = e.target.closest('[id^="btn-q"]');
  if (btnQ && !btnQ.disabled) {
    const qi = parseInt(btnQ.id.replace('btn-q',''), 10);
    advanceFromQuestion(qi);
  }

  /* Bouton "Commencer" */
  if (e.target.id === 'btn-start') startExperience();

  /* Bouton "Envoyer" */
  if (e.target.id === 'btn-submit') submitData(e);
});


/* ════════════════════════════════════════════════════════════
   FLUX PRINCIPAL
════════════════════════════════════════════════════════════ */
function startExperience() {
  showScreen('screen-q0');
  updateProgress(0);
}

function advanceFromQuestion(qi) {
  const answer = state.answers[qi];
  if (!answer) return;

  const isLast = qi === QUESTIONS.length - 1;

  /* Récupérer le feedback pour le commentaire de transition */
  const choice     = QUESTIONS[qi].choices.find(c => c.value === answer.value);
  const commentary = choice?.feedback || '';

  /* Masquer l'écran courant immédiatement */
  showScreen(null);

  if (isLast) {
    /*
      Dernière question : showResult() gère la transition vidéo.
      NE PAS appeler goTo() ici — c'est showResult() qui s'en charge.
    */
    showResult(commentary);
  } else {
    const nextVideos = resolveNextVideos(qi, answer.value);

    /*
      Les questions n'apparaissent QUE quand la prochaine boucle démarre
      (le afterCb est appelé par VideoManager._crossFade après le cross-fade).
    */
    videoMgr.goTo(
      nextVideos.trans,
      nextVideos.loop,
      () => {
        showScreen(`screen-q${qi + 1}`);
        updateProgress(qi + 1);
      },
      commentary
    );
  }
}


/* ════════════════════════════════════════════════════════════
   RÉSULTAT
════════════════════════════════════════════════════════════ */
function calcArchetype() {
  const firstValue = state.answers[0]?.value || 'Action';
  return ARCHETYPES[firstValue] || ARCHETYPES['Action'];
}

function showResult(commentary) {
  const arch = calcArchetype();
  document.getElementById('result-arch').textContent = arch.name;
  document.getElementById('result-desc').textContent = arch.desc;

  const recap = document.getElementById('result-recap');
  recap.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const a = state.answers[i];
    if (!a) return;
    const row = document.createElement('div');
    row.className = 'recap-row';
    row.innerHTML = `<span class="rq">${q.label.split(' ')[1] || q.label}</span>
                     <span class="ra">${a.label}</span>`;
    recap.appendChild(row);
  });

  /* Transition ruines → portail, puis boucle portail, puis afficher l'écran résultat */
  const preResultScene = VIDEO_SCENES[VIDEO_SCENES.length - 2]; /* Scene 4 (ruines) */
  const resultScene    = VIDEO_SCENES[VIDEO_SCENES.length - 1]; /* Scene 5 (portail) */

  videoMgr.goTo(
    preResultScene.trans,
    resultScene.loop,
    () => {
      showScreen('screen-result');
      updateProgress(QUESTIONS.length + 1);
    },
    commentary || 'Le portail s\'ouvre. Votre essence se révèle enfin.'
  );
}


/* ════════════════════════════════════════════════════════════
   COLLECTE DE DONNÉES
════════════════════════════════════════════════════════════ */
function submitData(e) {
  const btn   = e.target;
  const email = document.getElementById('email-input').value.trim();
  const arch  = document.getElementById('result-arch').textContent;

  const payload = {
    email,
    archetype: arch,
    q1: state.answers[0]?.label || '',
    q2: state.answers[1]?.label || '',
    q3: state.answers[2]?.label || '',
    q4: state.answers[3]?.label || '',
    timestamp: new Date().toISOString()
  };

  console.log('📤 Données:', payload);

  if (SCRIPT_URL) {
    fetch(SCRIPT_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    }).catch(err => console.warn('Envoi échoué:', err));
  }

  /* Jouer la transition finale portail → fin */
  const lastScene = VIDEO_SCENES[VIDEO_SCENES.length - 1];
  videoMgr.playFinal(lastScene.trans);

  btn.textContent   = 'Profil envoyé  ✦';
  btn.disabled      = true;
  btn.style.opacity = '0.45';
}


/* ════════════════════════════════════════════════════════════
   EFFET MIST BURST (sélection d'un choix)
════════════════════════════════════════════════════════════ */
function spawnMistBurst(element) {
  const r  = element.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;

  for (let i = 0; i < 3; i++) {
    const ring = document.createElement('div');
    ring.className = 'mist-ring';
    ring.style.cssText = `left:${cx}px;top:${cy}px;animation-delay:${i*100}ms`;
    document.body.appendChild(ring);
    setTimeout(() => ring.remove(), 1050 + i * 100);
  }

  const colors = ['rgba(220,232,252,0.9)','rgba(200,216,238,0.7)',
                  'rgba(184,154,90,0.6)', 'rgba(210,225,245,0.5)'];
  for (let i = 0; i < 18; i++) {
    const pt     = document.createElement('div');
    pt.className = 'sel-pt';
    const ang    = (Math.PI * 2 / 18) * i + (Math.random() - 0.5) * 0.4;
    const dist   = 22 + Math.random() * 70;
    const dx     = Math.cos(ang) * dist;
    const dy     = Math.sin(ang) * dist - 18;
    const color  = colors[Math.floor(Math.random() * colors.length)];
    const size   = 2 + Math.random() * 2;
    pt.style.cssText = `
      left:${cx}px;top:${cy}px;
      width:${size}px;height:${size}px;
      background:${color};
      --dx:${dx}px;--dy:${dy}px;
      animation-duration:${300+Math.random()*380}ms;
      animation-delay:${Math.random()*70}ms;
      box-shadow:0 0 4px ${color};`;
    document.body.appendChild(pt);
    setTimeout(() => pt.remove(), 850);
  }
}


/* ════════════════════════════════════════════════════════════
   PARTICULES DE BRUME AMBIANTE
════════════════════════════════════════════════════════════ */
(function spawnWisps() {
  for (let i = 0; i < 5; i++) {
    const w = document.createElement('div');
    w.className = 'wisp';
    const h = 140 + Math.random() * 240;
    w.style.cssText = `
      width:${h}px;height:${h * 0.34}px;
      top:${12 + Math.random() * 68}%;
      background:rgba(155,172,195,1);
      animation-duration:${48 + Math.random() * 42}s;
      animation-delay:${-Math.random() * 75}s;`;
    document.body.appendChild(w);
  }
})();


/* ════════════════════════════════════════════════════════════
   LANCEMENT
════════════════════════════════════════════════════════════ */
buildQuestionScreens();
videoMgr.init(VIDEO_SCENES[0].intro, VIDEO_SCENES[0].loop);

</script>
